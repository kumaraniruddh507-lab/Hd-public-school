<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admission Form | HDPS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* अगर CSS फाइल लोड न हो, तो भी यह फॉर्म मोबाइल पर सही दिखेगा */
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        .form-container { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 400px; 
            margin: 20px auto;
            border-top: 6px solid #003366;
        }
        h2 { text-align: center; color: #003366; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #333; }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            font-size: 16px; /* 16px से कम होने पर आईफोन ज़ूम हो जाता है */
            box-sizing: border-box; 
        }
        .btn-submit { 
            background-color: #003366; 
            color: white; 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px;
            -webkit-appearance: none; /* मोबाइल ब्राउज़र फिक्स */
        }
        .btn-submit:active { background-color: #001a33; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #003366; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Admission Form</h2>
        <p style="text-align:center; color:#666; font-size:13px; margin-bottom:20px;">H.D. Public School, Prayagraj</p>
        
        <form action="https://formspree.io/f/mjgarjrg" method="POST">
            
            <div class="input-group">
                <label>बच्चे का नाम (Student Name)</label>
                <input type="text" name="Student_Name" placeholder="यहाँ नाम लिखें" required>
            </div>

            <div class="input-group">
                <label>मोबाइल नंबर (Mobile Number)</label>
                <input type="tel" name="Mobile" placeholder="मोबाइल नंबर लिखें" required>
            </div>

            <div class="input-group">
                <label>पूरा पता (Full Address)</label>
                <textarea name="Address" rows="3" placeholder="अपना पता लिखें" required></textarea>
            </div>

            <button type="submit" class="btn-submit">सबमिट करें (Submit)</button>
            
        </form>

        <div class="back-link">
            <a href="index.html">← वापस होम पेज पर जाएं</a>
        </div>
    </div>

</body>
</html>
